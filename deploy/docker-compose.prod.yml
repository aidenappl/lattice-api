# Lattice Orchestrator production stack
# Deploy: curl -fsSL https://raw.githubusercontent.com/aidenappl/lattice-api/main/deploy/setup.sh | bash

services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-lattice}
      MYSQL_DATABASE: lattice
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  lattice-api:
    image: ${REGISTRY_URL:-registry.appleby.cloud}/lattice-api:latest
    restart: always
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      DATABASE_DSN: "root:${DB_ROOT_PASSWORD:-lattice}@tcp(mariadb:3306)"
      JWT_SIGNING_KEY: "${JWT_SIGNING_KEY}"
      LATTICE_ADMIN_EMAIL: "${ADMIN_EMAIL:-admin@lattice.local}"
      LATTICE_ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      PORT: "8000"
      ENVIRONMENT: "production"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS:-https://lattice.appleby.cloud}"
      COOKIE_DOMAIN: "${COOKIE_DOMAIN:-.appleby.cloud}"
      TLS_CERT: ""
      TLS_KEY: ""
      # Self-update: points to the host directory containing this compose file
      DOCKER_COMPOSE_DIR: "${DOCKER_COMPOSE_DIR:-/opt/lattice}"
      API_SERVICE_NAME: "${API_SERVICE_NAME:-lattice-api}"
      WEB_SERVICE_NAME: "${WEB_SERVICE_NAME:-lattice-web}"
      DOCKER_HELPER_CONTAINER: "${DOCKER_HELPER_CONTAINER:-lattice-docker-helper}"
      REGISTRY_URL: "${REGISTRY_URL:-registry.appleby.cloud}"
      REGISTRY_USERNAME: "${REGISTRY_USERNAME}"
      REGISTRY_PASSWORD: "${REGISTRY_PASSWORD}"
      # Forta (optional)
      FORTA_API_DOMAIN: "${FORTA_API_DOMAIN:-}"
      FORTA_LOGIN_DOMAIN: "${FORTA_LOGIN_DOMAIN:-}"
      FORTA_APP_DOMAIN: "${FORTA_APP_DOMAIN:-}"
      FORTA_CLIENT_ID: "${FORTA_CLIENT_ID:-}"
      FORTA_CLIENT_SECRET: "${FORTA_CLIENT_SECRET:-}"
      FORTA_CALLBACK_URL: "${FORTA_CALLBACK_URL:-}"
      FORTA_JWT_SIGNING_KEY: "${FORTA_JWT_SIGNING_KEY:-}"
      FORTA_COOKIE_DOMAIN: "${FORTA_COOKIE_DOMAIN:-}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_COMPOSE_DIR:-/opt/lattice}:/opt/lattice:ro
      - /root/.docker:/root/.docker
    depends_on:
      mariadb:
        condition: service_healthy

  lattice-web:
    image: ${REGISTRY_URL:-registry.appleby.cloud}/lattice-web:latest
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_LATTICE_API: "${PUBLIC_API_URL:-http://localhost:8000}"

  # Persistent sidecar used by the API to recreate itself after a self-update.
  # Runs docker compose on behalf of the API container so the recreate survives
  # the API container's own shutdown.
  docker-helper:
    image: docker:cli
    container_name: lattice-docker-helper
    restart: always
    entrypoint: ["tail", "-f", "/dev/null"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DOCKER_COMPOSE_DIR:-/opt/lattice}:/opt/lattice:ro

volumes:
  mariadb_data:
