services:
  mariadb:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: lattice
      MYSQL_DATABASE: lattice
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  lattice-api:
    build: .
    # Production: replace 'build' with 'image' for self-update to work:
    # image: registry.appleby.cloud/lattice-api:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_DSN: "root:lattice@tcp(mariadb:3306)"
      JWT_SIGNING_KEY: "dev-jwt-signing-key-change-in-production"
      LATTICE_ADMIN_EMAIL: "admin@lattice.local"
      LATTICE_ADMIN_PASSWORD: "admin"
      PORT: "8000"
      ENVIRONMENT: "development"
      ALLOWED_ORIGINS: "http://localhost:3000"
      DOCKER_COMPOSE_DIR: "/compose"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/compose:ro
    depends_on:
      mariadb:
        condition: service_healthy

  lattice-web:
    build: ../lattice-web
    # Production: replace 'build' with 'image' for self-update to work:
    # image: registry.appleby.cloud/lattice-web:latest
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_LATTICE_API: "http://localhost:8000"

volumes:
  mariadb_data:
